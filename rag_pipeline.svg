  <text class="ts" x="510" y="154" text-anchor="middle">encode_query() · L2 normalised</text>
  <line x1="510" y1="164" x2="510" y2="180" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect fill="#faeeda" stroke="#854f0b" x="400" y="180" width="220" height="44" rx="8"/>
