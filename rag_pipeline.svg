<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 700" width="680" height="700">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; }
      .th { font-size: 13px; font-weight: 600; fill: #1a1a2e; }
      .ts { font-size: 11px; fill: #4a4a6a; }
    </style>
  </defs>
  <rect width="680" height="700" fill="#fafaf8"/>
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a2e">RAG Pipeline — End-to-End Architecture</text>
  <line x1="340" y1="38" x2="340" y2="560" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="170" y="52" text-anchor="middle" font-size="11" fill="#888">Indexing Pipeline</text>
  <text x="510" y="52" text-anchor="middle" font-size="11" fill="#888">Query Pipeline</text>
  <rect fill="#e1f5ee" stroke="#0f6e56" x="60" y="60" width="220" height="44" rx="8"/>
  <text class="th" x="170" y="79" text-anchor="middle">PDF Collection</text>
  <text class="ts" x="170" y="94" text-anchor="middle">data/pdfs/*.pdf</text>
