  <rect fill="#faece7" stroke="#993c1d" x="400" y="300" width="220" height="44" rx="8"/>
  <text class="th" x="510" y="319" text-anchor="middle">Prompt Construction</text>
  <text class="ts" x="510" y="334" text-anchor="middle">TinyLlama chat template</text>
  <line x1="510" y1="344" x2="510" y2="360" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect fill="#faece7" stroke="#993c1d" x="400" y="360" width="220" height="44" rx="8"/>
  <text class="th" x="510" y="379" text-anchor="middle">LLM Generation</text>
  <text class="ts" x="510" y="394" text-anchor="middle">TinyLlama-1.1B-Chat · fp16</text>
  <line x1="510" y1="404" x2="510" y2="420" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect fill="#eaf3de" stroke="#3b6d11" x="400" y="420" width="220" height="44" rx="8"/>
  <text class="th" x="510" y="439" text-anchor="middle">Answer + Citations</text>
  <text class="ts" x="510" y="454" text-anchor="middle">filename + page + score + snippet</text>
  <path d="M280 382 L320 382 L320 202 L398 202" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="310" y="374" text-anchor="middle" font-size="10" fill="#888">index</text>
  <rect x="40" y="490" width="600" height="80" rx="8" fill="#f0eff8" stroke="#ccc"/>
  <text x="340" y="510" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a2e">Legend</text>
  <rect fill="#e1f5ee" stroke="#0f6e56" x="58" y="520" width="12" height="12" rx="2"/>
  <text class="ts" x="76" y="530">PDF Ingestion (loader.py)</text>
  <rect fill="#eeedfe" stroke="#534ab7" x="58" y="540" width="12" height="12" rx="2"/>
  <text class="ts" x="76" y="550">Embeddings + FAISS (embedder.py, vectorstore.py)</text>
  <rect fill="#faeeda" stroke="#854f0b" x="310" y="520" width="12" height="12" rx="2"/>
  <text class="ts" x="328" y="530">Retrieval (retriever.py)</text>
  <rect fill="#faece7" stroke="#993c1d" x="310" y="540" width="12" height="12" rx="2"/>
  <text class="ts" x="328" y="550">Generation (rag_pipeline.py)</text>
  <rect fill="#eaf3de" stroke="#3b6d11" x="530" y="520" width="12" height="12" rx="2"/>
  <text class="ts" x="548" y="530">Output</text>
  <text x="340" y="600" text-anchor="middle" font-size="11" fill="#888">Index stored: faiss_index/faiss_index.bin + metadata.pkl</text>
  <text x="340" y="618" text-anchor="middle" font-size="11" fill="#888">Bonus UI: streamlit_app.py</text>
  <text x="340" y="640" text-anchor="middle" font-size="10" fill="#aaa">nolimit-ds-test-raka | Multi-Document PDF RAG Assistant</text>
