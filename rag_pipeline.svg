  <line x1="510" y1="104" x2="510" y2="120" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect fill="#faeeda" stroke="#854f0b" x="400" y="120" width="220" height="44" rx="8"/>
