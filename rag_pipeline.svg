  <rect fill="#e1f5ee" stroke="#0f6e56" x="60" y="120" width="220" height="44" rx="8"/>
  <text class="th" x="170" y="139" text-anchor="middle">PDF Loader</text>
  <text class="ts" x="170" y="154" text-anchor="middle">loader.py + pypdf</text>
